@if (auth.isLoggedIn()) {
  <header class="topbar">
    <span class="brand">Onboarding</span>
    <nav class="nav">
      <a routerLink="/chat" routerLinkActive="active">Chat</a>
      <a routerLink="/checklist" routerLinkActive="active">My checklist</a>
      <a routerLink="/documents" routerLinkActive="active">Documents</a>
      @if (auth.isAdmin()) {
        <a routerLink="/templates" routerLinkActive="active">Templates</a>
        <a routerLink="/dashboard" routerLinkActive="active">Dashboard</a>
      }
      <a routerLink="/help" routerLinkActive="active">Help</a>
    </nav>
    <span class="spacer"></span>
    <span class="who" [attr.data-initial]="initial()">{{ auth.user()?.fullName || auth.user()?.email }}</span>
    <button class="link-btn" (click)="logout()">Log out</button>
  </header>
}

<main class="content">
  <router-outlet />
</main>
